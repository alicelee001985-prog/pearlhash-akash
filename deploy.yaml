version: "2.0"

services:
  pearlhash-miner:
    image: ghcr.io/catfrommarss/pearlhash-akash:latest
    env:
      - PEARL_WALLET=prl1p6s8qgvslwnxhy0cacwg0wzhv4n4u4rdztyhffq06rx5w39gfuhlsqat66u
      - PEARL_WORKER=aalee9940
      - PEARL_POOL=84.32.220.219:9000

profiles:
  compute:
    pearlhash-miner:
      resources:
        cpu:
          units: 8
        memory:
          size: 8Gi
        storage:
          - size: 20Gi

  placement:
    local:
      pricing:
        pearlhash-miner:
          denom: uakt
          amount: 1

deployment:
  pearlhash-miner:
    local:
      profile: pearlhash-miner
      count: 1
