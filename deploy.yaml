---
version: "2.0"

services:
  pearlhash-miner:
    image: ghcr.io/catfrommarss/pearlhash-akash:latest
    env:
      - PEARL_WALLET=prl1p8y9ftke8xyp8njvsrrqs9f8f39syxfw2zyc3gm4rkmwsq2u7zd6qz3q02h
      - PEARL_WORKER=akash-pearlhash-1
      - PEARL_POOL=84.32.220.219:9000

profiles:
  compute:
    pearlhash-miner:
      resources:
        cpu:
          units: 8
        memory:
          size: 64Gi
        storage:
          - size: 100Gi
        gpu:
          units: 1
          attributes:
            vendor:
              nvidia:
                - model: h100
                  interface: pcie
                - model: h100
                  interface: sxm
                - model: h200
                - model: h200nvl
  placement:
    akash:
      pricing:
        pearlhash-miner:
          denom: uakt
          amount: 1500000

deployment:
  pearlhash-miner:
    akash:
      profile: pearlhash-miner
      count: 1
